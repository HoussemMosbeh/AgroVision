# ===============================
# Server
# ===============================
server.port=8080
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2MB

# ===============================
# CNN Service
# ===============================
cnn.service.url=http://localhost:8000
upload.dir=/tmp/agrovision/uploads

# ===============================
# Datasource (PostgreSQL example)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/AgroVision
spring.datasource.username=postgres
spring.datasource.password=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT Secret and Expiration
# ===============================
jwt.secret=very-very-very-long-secret-key-for-hmac-sha-256
# 24 hours in milliseconds
jwt.expiration=86400000   

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.com.agrovision=DEBUG


xgboost.service.url=http://localhost:8001