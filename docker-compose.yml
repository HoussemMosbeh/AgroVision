version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./BackEnd/AgroVision
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  frontend:
    build: ./FrontEnd
    ports:
      - "${FRONTEND_PORT}:80"

  cnn:
    build: ./AI/cnn
    ports:
      - "${CNN_PORT}:5000"

  xgboost:
    build: ./AI/xgboost
    ports:
      - "${XGBOOST_PORT}:5001"

volumes:
  pgdata:
