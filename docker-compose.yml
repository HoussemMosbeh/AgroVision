name: Local CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - name: Load .env file
        run: |
          if [ -f .env ]; then
            echo "Loading .env file"
            cat .env >> $GITHUB_ENV
          else
            echo "No .env file found"
            echo "POSTGRES_DB=AgroVision" >> $GITHUB_ENV
            echo "POSTGRES_USER=postgres" >> $GITHUB_ENV
            echo "POSTGRES_PASSWORD=123" >> $GITHUB_ENV
          fi

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_DB=${{ env.POSTGRES_DB }} \
            -e POSTGRES_USER=${{ env.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            -p 5432:5432 \
            postgres:15
          
          # Wait for PostgreSQL to be ready
          sleep 10

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build & Test Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ env.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          cd BackEnd/AgroVision
          mvn clean package -e

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          cd FrontEnd
          npm install
          npm run build

      - name: Test CNN
        run: |
          cd AI/cnn
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m unittest discover

      - name: Test XGBoost
        run: |
          cd AI/xgboost
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m unittest discover

      - name: Cleanup PostgreSQL
        if: always()
        run: |
          docker stop postgres || true
          docker rm postgres || true

  docker-compose-up:
    runs-on: self-hosted
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Load .env file
        run: |
          if [ -f .env ]; then
            echo "Loading .env file"
            cat .env >> $GITHUB_ENV
          else
            echo "POSTGRES_DB=AgroVision" >> $GITHUB_ENV
            echo "POSTGRES_USER=postgres" >> $GITHUB_ENV
            echo "POSTGRES_PASSWORD=123" >> $GITHUB_ENV
            echo "BACKEND_PORT=8080" >> $GITHUB_ENV
            echo "FRONTEND_PORT=3000" >> $GITHUB_ENV
            echo "CNN_PORT=8000" >> $GITHUB_ENV
            echo "XGBOOST_PORT=5001" >> $GITHUB_ENV
          fi

      - name: Create .env file for Docker Compose
        run: |
          echo "POSTGRES_DB=${{ env.POSTGRES_DB }}" > .env
          echo "POSTGRES_USER=${{ env.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}" >> .env
          echo "BACKEND_PORT=${{ env.BACKEND_PORT }}" >> .env
          echo "FRONTEND_PORT=${{ env.FRONTEND_PORT }}" >> .env
          echo "CNN_PORT=${{ env.CNN_PORT }}" >> .env
          echo "XGBOOST_PORT=${{ env.XGBOOST_PORT }}" >> .env

      - name: Build & Start Containers
        run: |
          docker compose down
          docker compose up -d --build

      - name: Cleanup
        if: always()
        run: rm -f .env