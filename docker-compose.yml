version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agrovision-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-AgroVision}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agrovision-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./BackEnd/AgroVision
    container_name: agrovision-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-AgroVision}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-123}
      CNN_SERVICE_URL: http://cnn-service:8000
      XGBOOST_SERVICE_URL: http://xgboost-service:8001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agrovision-network

  cnn-service:
    build: ./AI/cnn
    container_name: agrovision-cnn
    ports:
      - "${CNN_PORT:-8000}:8000"
    networks:
      - agrovision-network

  xgboost-service:
    build: ./AI/xgboost
    container_name: agrovision-xgboost
    ports:
      - "${XGBOOST_PORT:-8001}:8001"
    networks:
      - agrovision-network

  frontend:
    build: ./FrontEnd
    container_name: agrovision-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - agrovision-network

volumes:
  postgres_data:

networks:
  agrovision-network:
    driver: bridge