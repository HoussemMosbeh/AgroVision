services:
  postgres:
    image: postgres:15
    container_name: agrovision-postgres
    environment:
      POSTGRES_DB: agrovision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrovision-network

  backend:
    build: ./BackEnd/AgroVision
    container_name: agrovision-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      cnn:
        condition: service_started
      xgboost-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agrovision
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      cnn.service.url: http://cnn:8000
      xgboost.service.url: http://xgboost-service:8001
    networks:
      - agrovision-network

  cnn:
    build: ./AI/cnn
    container_name: agrovision-cnn
    ports:
      - "8000:8000"
    volumes:
      - ./AI/cnn/models:/app/models
    networks:
      - agrovision-network

  xgboost-service:
    build: ./AI/xgboost
    container_name: agrovision-xgboost
    ports:
      - "8001:8001"
    networks:
      - agrovision-network

  frontend:
    build: ./FrontEnd
    container_name: agrovision-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - agrovision-network

volumes:
  pgdata:

networks:
  agrovision-network:
    driver: bridge