version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./BackEnd/AgroVision
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  frontend:
    build: ./FrontEnd
    ports:
      - "${FRONTEND_PORT}:80"

  cnn:
    build: ./AI/cnn
    ports:
      - "${CNN_PORT}:8000"
    volumes:
      - ./AI/cnn/models:/app/models

  xgboost-service:
    build:
      context: ./AI/xgboost
    container_name: xgboost-service
    ports:
      - "8001:8001"
    networks:
      - agrovision-network
    restart: unless-stopped
    
volumes:
  pgdata: