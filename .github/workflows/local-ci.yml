name: Local CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agrovision
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v3

      # Backend
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Build & Test Backend
        run: |
          cd BackEnd/AgroVision
          mvn clean package
          mvn test

      # Frontend
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          cd FrontEnd
          npm install
          npm run build

      # AI modules
      - name: Test CNN
        run: |
          cd AI/cnn
          pip install -r requirements.txt
          python -m unittest discover

      - name: Test XGBoost
        run: |
          cd AI/xgboost
          pip install -r requirements.txt
          python -m unittest discover

  docker-compose-up:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v3
      - name: Build & Start Containers
        run: |
          docker-compose up -d --build
