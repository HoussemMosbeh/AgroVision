name: Local CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=AgroVision
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=123
          BACKEND_PORT=8080
          FRONTEND_PORT=5173
          CNN_PORT=8000
          XGBOOST_PORT=8001
          EOF

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_DB=AgroVision \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=123 \
            -p 5432:5432 \
            postgres:15
          sleep 10

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build & Test Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/AgroVision
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: 123
        run: |
          cd BackEnd/AgroVision
          mvn clean package -e

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          cd FrontEnd
          npm install
          npm run build

      - name: Test CNN
        run: |
          cd AI/cnn
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m unittest discover

      - name: Test XGBoost
        run: |
          cd AI/xgboost
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m unittest discover

      - name: Cleanup PostgreSQL
        if: always()
        run: |
          docker stop postgres || true
          docker rm postgres || true

  docker-compose-up:
    runs-on: self-hosted
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=AgroVision
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=123
          BACKEND_PORT=8080
          FRONTEND_PORT=5173
          CNN_PORT=8000
          XGBOOST_PORT=8001
          EOF

      - name: Build & Start Containers
        run: |
          docker compose down
          docker compose up -d --build

      - name: Cleanup
        if: always()
        run: |
          rm -f .env
          docker compose down